short_bio: >-
  <p>
    I am an undergraduate student in Artificial Intelligence at Tongji University.
  </p>
  <p>
    My recent work spans GUI agent evaluation, generative modeling, and autonomous driving simulation, but my primary interest lies in <strong>generative modeling</strong>. I am especially drawn to <strong>algorithmic research</strong> at the intersection of <strong>diffusion models</strong>, <strong>3D Gaussian Splatting</strong>, and <strong>agent systems</strong>, with a focus on building models that are more robust, controllable, and useful in complex real-world environments.
  </p>
  <p>
    I am actively seeking <strong>PhD opportunities beginning in Fall 2027</strong> and hope to continue working on algorithmic problems in generative and interactive AI. Outside research, I enjoy running, swimming, and <strong>landscape photography</strong>. Running is an important part of my daily routine and a way I maintain discipline and consistency; my current personal bests are 2:16 for 800 m, 3:00 for 1000 m, and 10:30 for 3000 m.
  </p>

